name: Tests

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE.txt"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby_version: ["3.3", "3.4", "4.0"]
        gemfile:
          - gemfiles/rails_7.2.gemfile
          - gemfiles/rails_8.1.gemfile

    env:
      RAILS_ENV: test
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ruby-${{ matrix.ruby_version }}-${{ matrix.gemfile }}
          path: test/reports/
          retention-days: 7

  # The dummy app is the living 0.5.0 demo AND the reference implementation
  # hosts copy. Its integration suite is the HTTP smoke of the reference
  # surfaces (four-state join screen, Access admin, OrganizationScoped 404
  # posture) — run it under the dummy's OWN bundle so a fresh clone's
  # `bin/rails test` experience is what CI certifies.
  dummy-app:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: test/dummy

      - name: Build Tailwind (app/assets/builds is gitignored)
        working-directory: test/dummy
        run: bin/rails tailwindcss:build

      - name: Prepare database
        working-directory: test/dummy
        run: bin/rails db:test:prepare

      - name: Run dummy app tests (reference-surface HTTP smoke)
        working-directory: test/dummy
        run: bin/rails test
